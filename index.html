<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팝업 실험물 - 스크롤 묻힘</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .experiment-wrap {
      width: 100%;
      max-width: 1000px;
      background: #ffffff;
      position: relative;
      overflow: hidden;
    }

    .condition-banner {
      background: #1a1a2e;
      color: #ffffff;
      text-align: center;
      padding: 10px;
      font-size: 13px;
    }

    .condition-banner strong {
      color: #f0c040;
    }

    .shopping-bg {
      width: 100%;
      height: 600px;
      background-image: url("shopbgimage.png"); /* 변경됨 */
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
      overflow-y: scroll;
      position: relative;
    }

    .scroll-spacer {
      height: 1200px;
    }

    .popup-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .popup-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .popup-box {
      width: 420px;
      max-width: 90%;
    }

    .popup-box img {
      width: 100%;
      display: block;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
    }

    .hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      color: #ffffff;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 110;
    }
  </style>
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "w62o2id839");
  </script>
</head>

<body>

  <div class="experiment-wrap">
    <div class="condition-banner">
      실험 조건 <strong>스크롤 묻힘</strong>
    </div>

    <div class="shopping-bg" id="shoppingBg">
      <div class="scroll-spacer"></div>

      <!-- 팝업 -->
      <div class="popup-overlay" id="popupOverlay">
        <div class="popup-box">
          <img src="popupad.png" alt="팝업 광고"> <!-- 변경됨 -->
        </div>
      </div>

      <div class="hint">↓ 아래로 스크롤하면 팝업이 사라집니다</div>
    </div>
  </div>

  <script>
    const bg = document.getElementById("shoppingBg");
    const popupOverlay = document.getElementById("popupOverlay");

    function showPopup() {
      popupOverlay.classList.add("visible");
    }

    function dismissPopup() {
      popupOverlay.classList.remove("visible");
      bg.removeEventListener("scroll", scrollHandler);
    }

    function scrollHandler() {
      if (bg.scrollTop > 120) {
        dismissPopup();
      }
    }

    window.addEventListener("load", function () {
      bg.scrollTop = 0;
      bg.addEventListener("scroll", scrollHandler);
      setTimeout(showPopup, 1000);
    });
  </script>

</body>
</html>
